<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Team - TeamPulse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5048e5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden font-display">
<!-- Global Shell Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-6 md:px-10 py-3 sticky top-0 z-50">
<div class="flex items-center gap-4 text-slate-900 dark:text-slate-100">
<div class="size-6 text-primary">
<svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight">TeamPulse</h2>
</div>
<div class="flex flex-1 justify-end items-center gap-4">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-9 border border-slate-200 dark:border-slate-700" data-alt="Professional user profile avatar photo" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCPs6BCKxmulE9h0koX_NIFUmyIadRopqbG9lJDKfNAQ27XG9iZH3FFJKltASWfAicim6ER4rqgQ_TnYcQsfGMtCAjNPVfsnFat08nNFbDNmFNmBwl1pXKUyNQ7CW1qOa14H7ACuo7AL1vz8TnCnCO7i1XGFNcxkIo_YLQTeMM4ENavt_w0XNICr4mKGl6qfWEJ4q-FG_VvRvqKQ6fdqY5hWMMczfByGBe0vlnxDNDBzOfreiPfWy8YG0RNiCohv6ts4RTqG5Vqsj3v");'>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-4 py-12 md:py-20">
<div class="w-full max-w-[640px] bg-white dark:bg-slate-900/50 p-8 md:p-12 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<!-- Heading -->
<div class="mb-10">
<h1 class="text-slate-900 dark:text-white text-4xl font-black leading-tight tracking-tight mb-2">Create your team</h1>
<p class="text-slate-500 dark:text-slate-400 text-lg">Set up your team and start collaborating.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Team Name -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-200 text-sm font-semibold uppercase tracking-wider" for="team-name">
                            Team name <span class="text-primary">*</span>
</label>
<input class="block w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3.5 text-slate-900 dark:text-white placeholder-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="team-name" placeholder="e.g. Design Team" required="" type="text"/>
</div>
<!-- City -->
<div class="flex flex-col gap-2">
<div class="flex justify-between">
<label class="text-slate-900 dark:text-slate-200 text-sm font-semibold uppercase tracking-wider" for="city">City</label>
<span class="text-slate-400 text-xs font-medium uppercase italic">Optional</span>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">location_on</span>
<input class="block w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 pl-11 pr-4 py-3.5 text-slate-900 dark:text-white placeholder-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" data-location="Mumbai" id="city" placeholder="e.g. Mumbai" type="text"/>
</div>
</div>
<!-- Member Emails -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-200 text-sm font-semibold uppercase tracking-wider" for="emails">
                            Member emails <span class="text-primary">*</span>
</label>
<textarea class="block w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3.5 text-slate-900 dark:text-white placeholder-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none resize-none" id="emails" placeholder="One per line or comma-separated" required="" rows="4"></textarea>
<p class="text-slate-400 dark:text-slate-500 text-xs mt-1 italic">Invite your colleagues to join the workspace.</p>
</div>
<!-- Organiser Email -->
<div class="flex flex-col gap-2">
<div class="flex justify-between">
<label class="text-slate-900 dark:text-slate-200 text-sm font-semibold uppercase tracking-wider" for="organiser">Organiser email</label>
<span class="text-slate-400 text-xs font-medium uppercase italic">Optional</span>
</div>
<input class="block w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3.5 text-slate-900 dark:text-white placeholder-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="organiser" placeholder="e.g. organiser@example.com" type="email"/>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-lg shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span>Create team</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 flex justify-center">
<a class="text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-primary flex items-center gap-2 font-medium transition-colors" href="#">
<span class="material-symbols-outlined text-base">arrow_back</span>
                        Back home
                    </a>
</div>
</div>
</main>
<!-- Footer Decorations (Optional visual flair) -->
<footer class="py-10 text-center">
<p class="text-slate-400 dark:text-slate-600 text-sm">© 2024 TeamPulse. Powering high-performance teams.</p>
</footer>
</div>
</body></html>
